name: Build Android TV APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create local.properties
        working-directory: android-tv
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Accept SDK licenses and install components
        run: |
          SDKMANAGER=$(find $ANDROID_HOME -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER=$(find $ANDROID_SDK_ROOT -name "sdkmanager" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$SDKMANAGER" ]; then
            yes | $SDKMANAGER --licenses 2>/dev/null || true
            $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>/dev/null || true
          fi

      - name: Download and setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: android-tv
        run: gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        working-directory: android-tv
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ownTV-Android-TV-debug
          path: android-tv/app/build/outputs/apk/debug/*.apk
