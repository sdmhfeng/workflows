name: Build Android TV APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'android-tv/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            2>/dev/null || true

      - name: Download and setup Gradle
        run: |
          cd /tmp
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "/tmp/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: android-tv
        run: gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        working-directory: android-tv
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK (unsigned)
        working-directory: android-tv
        run: ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Find APK files
        run: |
          echo "=== All APK files ==="
          find android-tv -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ownTV-Android-TV-debug
          path: android-tv/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ownTV-Android-TV-release-unsigned
          path: android-tv/app/build/outputs/apk/release/*.apk
        continue-on-error: true
