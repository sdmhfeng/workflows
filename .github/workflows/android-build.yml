name: Build Android TV APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "ANDROID_HOME not accessible"
          ls -la $ANDROID_SDK_ROOT/ 2>/dev/null || echo "ANDROID_SDK_ROOT not accessible"

      - name: Create local.properties
        working-directory: android-tv
        run: |
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          cat local.properties

      - name: Accept SDK licenses and install components
        run: |
          SDKMANAGER=$(find $ANDROID_HOME -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER=$(find $ANDROID_SDK_ROOT -name "sdkmanager" -type f 2>/dev/null | head -1)
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          if [ -n "$SDKMANAGER" ]; then
            yes | $SDKMANAGER --licenses 2>&1 | tail -5
            $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>&1 | tail -10
          else
            echo "WARNING: sdkmanager not found, Gradle will download SDK components"
          fi

      - name: Download and setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH
          gradle --version

      - name: Generate Gradle Wrapper
        working-directory: android-tv
        run: gradle wrapper --gradle-version 8.5

      - name: Build Debug APK
        working-directory: android-tv
        run: ./gradlew assembleDebug --stacktrace --info
