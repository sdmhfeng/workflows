name: Build Android TV APK (Server + Player)

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  schedule:
    # Rebuild APK with fresh channel data every 3 days at 22:10 UTC
    - cron: '10 22 */3 * *'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ──────────────────────────────────────────
      # Step 1: Set up Python and generate M3U data
      # ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pipenv
          pipenv requirements > requirements.txt
          pip install -r requirements.txt

      - name: Run IPTV channel scraper
        run: |
          echo "Starting IPTV channel aggregation..."
          python main.py
          echo "Channel aggregation complete."

      - name: Verify M3U output
        run: |
          if [ -f "output/user_result.m3u" ]; then
            CHANNEL_COUNT=$(grep -c "^#EXTINF:" output/user_result.m3u || echo 0)
            echo "M3U generated with ${CHANNEL_COUNT} channels"
          else
            echo "WARNING: M3U file not found, using existing assets"
          fi

      - name: Copy M3U data to Android assets
        run: |
          mkdir -p android-tv/app/src/main/assets
          if [ -f "output/user_result.m3u" ]; then
            cp output/user_result.m3u android-tv/app/src/main/assets/result.m3u
            echo "Copied M3U to assets"
          fi
          if [ -f "output/user_result.txt" ]; then
            cp output/user_result.txt android-tv/app/src/main/assets/result.txt
            echo "Copied TXT to assets"
          fi

      # ──────────────────────────────────────────
      # Step 2: Build the Android APK
      # ──────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Debug environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          java -version

      - name: Create local.properties
        working-directory: android-tv
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      - name: Accept SDK licenses and install components
        run: |
          SDKMANAGER=$(find $ANDROID_HOME -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            SDKMANAGER=$(find $ANDROID_SDK_ROOT -name "sdkmanager" -type f 2>/dev/null | head -1)
          fi
          if [ -n "$SDKMANAGER" ]; then
            yes | $SDKMANAGER --licenses 2>/dev/null || true
            $SDKMANAGER "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>/dev/null || true
          fi

      - name: Download and setup Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Generate Gradle Wrapper
        working-directory: android-tv
        run: gradle wrapper --gradle-version 8.5

      - name: Build Release APK
        working-directory: android-tv
        run: ./gradlew assembleRelease --stacktrace

      # ──────────────────────────────────────────
      # Step 3: Upload the APK as build artifact
      # ──────────────────────────────────────────
      - name: Find and rename APK
        run: |
          APK_PATH=$(find android-tv -name "*.apk" -path "*/release/*" | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find android-tv -name "*.apk" | head -1)
          fi
          echo "APK found at: $APK_PATH"
          APK_NAME="ownTV-$(date +%Y%m%d).apk"
          cp "$APK_PATH" "$APK_NAME"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ownTV-APK
          path: ownTV-*.apk
          retention-days: 90
