name: Build Android TV APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'android-tv/**'
      - '.github/workflows/android-build.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: android-tv
          gradle-version: 8.5

      - name: Build Debug APK
        run: cd android-tv && gradle assembleDebug --stacktrace

      - name: Build Release APK (unsigned)
        run: cd android-tv && gradle assembleRelease --stacktrace
        continue-on-error: true

      - name: List APK files
        run: |
          echo "=== Debug APKs ==="
          find android-tv -name "*.apk" -type f
          echo "=== File sizes ==="
          find android-tv -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ownTV-Android-TV-debug
          path: android-tv/app/build/outputs/apk/debug/*.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: ownTV-Android-TV-release-unsigned
          path: android-tv/app/build/outputs/apk/release/*.apk
        continue-on-error: true
